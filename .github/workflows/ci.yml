name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: 1.96.0
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: macOS Apple Silicon
            os: macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt,clippy
          rustup default "$RUST_VERSION"

      - name: Install LLVM and native libraries (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev clang-22 libclang-rt-22-dev \
            libssl-dev zlib1g-dev libzstd-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG=/usr/lib/llvm-22/bin/llvm-config" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-22/bin" >> "$GITHUB_PATH"

      - name: Install LLVM and native libraries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install llvm@22 openssl@3 zstd
          LLVM_PREFIX="$(brew --prefix llvm@22)"
          echo "LLVM_SYS_221_PREFIX=$LLVM_PREFIX" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG=$LLVM_PREFIX/bin/llvm-config" >> "$GITHUB_ENV"
          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
          echo "LIBRARY_PATH=$(brew --prefix openssl@3)/lib:$(brew --prefix zstd)/lib" >> "$GITHUB_ENV"

      - name: Verify toolchain
        shell: bash
        run: |
          rustc --version
          "$LLVM_CONFIG" --version
          cc --version

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build compiler and runtime
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Build release compiler
        run: cargo build --locked --release -p align_runtime -p align_driver

      - name: Smoke test packaged command
        shell: bash
        run: |
          ./target/release/alignc --version
          ./target/release/alignc build examples/hello.align
          ./hello
