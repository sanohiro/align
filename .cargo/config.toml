# Pin llvm-sys to dynamic linking against libLLVM-19.so.
# Debian's llvm-19 is shared-mode (does not ship static components like libPolly.a),
# so the default static linking fails with "could not find native static library `Polly`".
# llvm-config also reports --shared-mode = shared.
[env]
LLVM_SYS_191_PREFER_DYNAMIC = "1"
